version: '3.8'

services:

  backend:
    build: ./backend
    container_name: safeguard-backend
    restart: always
    env_file:
      - .env
    ports:
      - "3333:3333"
    networks:
      - safeguard-net

  frontend:
    build: ./frontend
    container_name: safeguard-frontend
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - safeguard-net

  nginx:
    image: nginx:alpine
    container_name: safeguard-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - safeguard-net

networks:
  safeguard-net:
    driver: bridge
